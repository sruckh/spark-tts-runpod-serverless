name: Build and Deploy Spark-TTS RunPod Serverless

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'handler.py'
      - 'utils/**'
      - 'Dockerfile'
      - 'requirements-serverless.txt'
      - 'download_models.py'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: gemneye/spark-tts-runpod-serverless

jobs:
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8 black isort

      - name: Run Black formatter check
        run: |
          black --check --diff handler.py utils/ download_models.py

      - name: Run isort import sorting check
        run: |
          isort --check-only --diff handler.py utils/ download_models.py

      - name: Run flake8
        run: |
          flake8 handler.py utils/ download_models.py --max-line-length=120 --extend-ignore=E203,W503

      - name: Run pylint
        run: |
          pylint handler.py utils/ download_models.py --fail-under=8.0 --disable=C0114,C0115,C0116

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, security]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Test Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test image health check
        run: |
          docker run --rm --health-timeout=30s --health-retries=3 \
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ github.sha }} \
            python -c "import torch; print('Health check passed')"

  deploy-staging:
    name: Deploy to Staging (RunPod)
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://api.runpod.ai/
    steps:
      - name: Deploy to RunPod Staging
        run: |
          echo "Deployment to RunPod staging would happen here"
          echo "Image: ${{ env.IMAGE_NAME }}:develop-${{ github.sha }}"
          # Add actual RunPod CLI deployment commands here

  deploy-production:
    name: Deploy to Production (RunPod)
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://api.runpod.ai/
    steps:
      - name: Deploy to RunPod Production
        run: |
          echo "Deployment to RunPod production would happen here"
          echo "Image: ${{ env.IMAGE_NAME }}:latest"
          # Add actual RunPod CLI deployment commands here

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result != 'skipped' || needs.deploy-production.result != 'skipped')
    steps:
      - name: Notify Success
        if: needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success'
        run: |
          echo "✅ Deployment successful!"
          echo "Image: ${{ env.IMAGE_NAME }}"
          
      - name: Notify Failure
        if: needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          exit 1