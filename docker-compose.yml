version: '3.8'

services:
  spark-tts-serverless:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: gemneye/spark-tts-runpod-serverless:latest
    container_name: spark-tts-serverless
    
    # Environment variables for testing
    environment:
      # AWS S3 Configuration (use your own values for testing)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-your-access-key}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-your-secret-key}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-your-bucket-name}
      
      # RunPod configuration
      - RUNPOD_ENDPOINT_ID=${RUNPOD_ENDPOINT_ID:-test}
      - RUNPOD_API_KEY=${RUNPOD_API_KEY:-test}
      
      # Python configuration
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      
      # Logging
      - LOG_LEVEL=INFO
    
    # Port mapping for local testing (if needed)
    ports:
      - "8000:8000"
    
    # Volume mounts for persistence and testing
    volumes:
      # Mount local runpod-volume for persistence during development
      - ./runpod-volume:/runpod-volume
      
      # Mount source code for development (optional)
      # - ./handler.py:/runpod-volume/Spark-TTS/handler.py
      # - ./utils:/runpod-volume/Spark-TTS/utils
    
    # Resource limits (adjust based on your system)
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4'
        reservations:
          memory: 4G
          cpus: '2'
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import torch; print('Health check passed')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Restart policy
    restart: unless-stopped
    
    # Use GPU if available (requires nvidia-docker)
    # Uncomment the following lines if you have NVIDIA GPU support
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
    #   - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    
    # Command override for testing
    command: ["python", "handler.py"]

  # MinIO for local S3 testing (optional)
  minio:
    image: minio/minio:latest
    container_name: spark-tts-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    profiles:
      - testing  # Only start with --profile testing

  # Create S3 buckets for testing
  minio-createbuckets:
    image: minio/mc:latest
    container_name: spark-tts-createbuckets
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      /usr/bin/mc mb myminio/spark-tts-test || true;
      /usr/bin/mc policy set public myminio/spark-tts-test || true;
      echo 'Created bucket: spark-tts-test';
      exit 0;
      "
    profiles:
      - testing  # Only start with --profile testing

volumes:
  minio-data:
    driver: local

# Networks
networks:
  default:
    name: spark-tts-network